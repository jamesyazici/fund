<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/fund-frontend/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fund Transparency Portal</title>
    <meta name="description" content="Real-time public dashboard for a multi-pod quantitative fund." />
    <script>
      // Set theme before paint to avoid a flash of the wrong color scheme.
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'system';
          var dark =
            t === 'dark' ||
            (t === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
